name: Lab 1 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Create .env file from secrets
        run: |
          touch ./.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ./.env
          echo "JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}" >> ./.env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> ./.env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> ./.env
          echo "GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}" >> ./.env
          echo "CLIENT_URL=${{ secrets.CLIENT_URL }}" >> ./.env

      - name: Build and Start
        run: docker compose up -d

      - name: Wait for Readiness
        run: |
          for i in {1..15}; do
            if curl -s localhost:3000/api/health; then
              echo "App is ready!"
              break
            fi
            echo "Waiting..."
            sleep 3
          done

      - name: Run Grading Script
        run: |
          chmod +x ./tests/lab1_test.sh
          ./tests/lab1_test.sh