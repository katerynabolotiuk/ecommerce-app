name: Lab 3 Grading

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ecommerce

      - name: Build Docker Image
        run: |
          docker build -t ecommerce-app:latest .
          kind load docker-image ecommerce-app:latest --name ecommerce

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/db.yaml
          kubectl apply -f k8s/app.yaml
          
      - name: Wait for Deployments
              run: |
                kubectl rollout status deployment/postgres --timeout=60s
                kubectl rollout status deployment/ecommerce-app --timeout=60s
        

      - name: Run Master Validation Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh