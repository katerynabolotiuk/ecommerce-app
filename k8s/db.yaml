apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "ecommerce"
  DB_USER: "postgres"
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/ecommerce"
  POSTGRES_HOST: "postgres"
  POSTGRES_DB: "ecommerce"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secret
type: Opaque
data:
  DB_PASSWORD: cG9zdGdyZXM= 
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  # postgresql://postgres:postgres@postgres:5432/ecommerce у base64:
  DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBvc3RncmVzQHBvc3RncmVzOjU0MzIvZWNvbW1lcmNl
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "ecommerce"

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432